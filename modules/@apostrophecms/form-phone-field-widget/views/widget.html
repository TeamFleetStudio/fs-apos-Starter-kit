{# ids must be unique doc-wide #}
{% set id = apos.util.generateId() %}
{% set widget = data.widget %}
{% set prependIfPrefix = apos.modules['@apostrophecms/form'].prependIfPrefix %}
{% import "fragments/utility.html" as utils with context %}

<div data-apos-form-phone class="apos-form-input-wrapper apos-form-phone-wrapper">
  <label for="{{ id }}"
    class="apos-form-label {{ prependIfPrefix('__label') }}"
  >
    {{ widget.fieldLabel }}
    {{ utils.optional(widget.required) }}
    {{ utils.required(widget.required) }}
  </label>
  <input
    class="apos-form-input apos-form-phone-tel {{ prependIfPrefix('__input') }}"
    type="tel"
    placeholder="{{ widget.placeholder or 'Enter your phone number' }}"
    id="{{ id }}"
    name="{{ widget.fieldName }}"
    autocomplete="tel"
    data-apos-phone-default-country="{{ widget.defaultCountry or 'in' }}"
    {% if widget.required %}data-apos-required{% endif %}
    {% if widget.errorMessage %}data-apos-error-message="{{ widget.errorMessage }}"{% endif %}
  />
  <span
    class="apos-form-field-error {{ prependIfPrefix('__field-error') }}"
    data-apos-input-message="{{ widget.fieldName }}" hidden></span>
</div>
